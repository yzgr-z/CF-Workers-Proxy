name = 'workers' # 替换为你在 Cloudflare 上的 Worker 名称
main = "_worker.js" # 替换为你的 JS 文件名，例如 worker.js 或 src/index.js

# 如果你使用的是 Workers Unbound (旧版) 或需要指定环境
compatibility_date = "2026-05-24"

# 如果你有环境变量，也可以在这里定义（或者在 Cloudflare Dashboard 的 Settings -> Variables 中定义）
# [vars]
#PROXY_HOSTNAME = "github.com"
